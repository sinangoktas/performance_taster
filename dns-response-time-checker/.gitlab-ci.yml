build:
    stage: build
    image: docker
    services:
      - docker: dind
    script:
      - echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER $CI_REGISTRY --password-stdin
      - docker build -t $CI_REGISTRY_IMAGE .
      - docker push $CI_REGISTRY_IMAGE:latest
    artifacts:
      - expire_in: 1hr
      - paths:
         - ${DOCKER_FULL_IMAGE_CACHE}
    rules:
      - if: $DEBUG_PIPELINES == "true"
        when: on_success
      - if: $EPHEMERAL_NAME != ""
        when: on_success
      - when: on_success